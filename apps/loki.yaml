apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: 2.10.2
    helm:
      values: |
        loki:
          persistence:
            enabled: true
            storageClassName: local-path
            size: 5Gi
          config:
            table_manager:
              retention_deletes_enabled: true
              retention_period: 72h
          resources:
            requests:
              memory: "256Mi"
            limits:
              memory: "512Mi"
        
        promtail:
          enabled: true
          resources:
            limits:
              memory: "100Mi"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true