apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 69.3.1
      helm:
        valueFiles:
          - $values/manifests/monitoring/values.yaml
    - repoURL: git@github.com:k5sha/k5sha-gitops.git 
      targetRevision: HEAD
      ref: values
  destination:
    name     : in-cluster
    namespace: monitoring 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true