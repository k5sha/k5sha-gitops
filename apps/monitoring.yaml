apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 69.3.0
    helm:
      values: |
        prometheusOperator:
          enabled: true
          admissionWebhooks:
            enabled: false

        prometheus:
          enabled: true
          prometheusSpec:
            retention: 5d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 8Gi
            resources:
              requests:
                memory: "400Mi"
              limits:
                memory: "800Mi"

        grafana:
          enabled: true
          plugins:
            - victoriametrics-logs-datasource
          additionalDataSources:
            - name: VictoriaLogs
              type: victoriametrics-logs-datasource
              access: proxy
              url: http://victoria-logs-single-server.monitoring.svc.cluster.local:9428
              editable: true

        kube-state-metrics:
          enabled: true
        
        alertmanager:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true