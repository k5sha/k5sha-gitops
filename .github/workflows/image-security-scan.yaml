name: "Image Security Scan 🤖"

on:
  push:
    branches: [ main ]
    paths:
      - 'manifests/**'
  schedule:
    - cron: '0 0 * * 0'

jobs:
  extract-images:
    name: Extract Images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Image Matrix
        id: set-matrix
        run: |
          # Знаходимо образи, чистимо їх і перетворюємо у JSON масив для Matrix
          IMAGES=$(grep -r "image:" manifests/ | awk '{print $NF}' | tr -d '"' | tr -d "'" | sort -u | jq -R . | jq -s -c .)
          echo "matrix=$IMAGES" >> $GITHUB_OUTPUT

  trivy-scan:
    name: Scan
    needs: extract-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false 
      matrix:
        image: ${{ fromJson(needs.extract-images.outputs.matrix) }}
    
    steps:
      - name: Run Trivy Scan for ${{ matrix.image }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
