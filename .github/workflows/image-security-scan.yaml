name: "Image Security Scan 🤖"

on:
  push:
    branches: [ main ]
    paths:
      - 'manifests/**'
  schedule:
    - cron: '0 0 * * 0'

jobs:
  trivy-image-scan:
    name: Scan Container Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Images from Manifests
        id: extract_images
        run: |
          # Finds lines with "image:", removes whitespace and quotes, and gets unique images
          IMAGES=$(grep -r "image:" manifests/ | awk '{print $3}' | tr -d '"' | tr -d "'" | sort -u)
          
          # Join images by space for the loop
          echo "found_images=$IMAGES" >> $GITHUB_OUTPUT
          echo "Images found for scanning: $IMAGES"

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.extract_images.outputs.found_images }}
          format: 'table'
          exit-code: '1' 
          ignore-unfixed: true 
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Alert on Failure
        if: failure()
        run: |
          echo "Security scan failed! One or more images in the manifests/ directory contain CRITICAL or HIGH vulnerabilities."