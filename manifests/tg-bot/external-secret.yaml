apiVersion: external-secrets.io/v1alpha1
kind: ExternalSecret
metadata:
  name: tg-bot-secrets
  namespace: tg-bot
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: tg-bot-secrets 
    creationPolicy: Owner
  data:
  - secretKey: bot_token
    remoteRef:
      key: tg-bot
      property: bot_token
