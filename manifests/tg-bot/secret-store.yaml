apiVersion: v1
kind: ServiceAccount
metadata:
  name: tg-bot-eso-sa
  namespace: tg-bot
---
apiVersion:  external-secrets.io/v1alpha1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: tg-bot
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "tg-bot-eso-role" 
          serviceAccountRef:
            name: "tg-bot-eso-sa"
            audiences:
              - vault