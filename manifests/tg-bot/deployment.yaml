apiVersion: apps/v1
kind: Deployment
metadata:
  name: tg-bot
  namespace: tg-bot
  labels:
    app: tg-bot
spec:
  replicas: 1 
  strategy:
    type: Recreate 
  selector:
    matchLabels:
      app: tg-bot
  template:
    metadata:
      labels:
        app: tg-bot
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: bot
        image: ghcr.io/k5sha/tg-downloader-bot:ad07c30
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        env:
        - name: BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: tg-bot-secrets
              key: bot_token
        resources:
          requests:
            memory: "128Mi" 
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}