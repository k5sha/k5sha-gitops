apiVersion: external-secrets.io/v1alpha1
kind: ExternalSecret
metadata:
  name: tikceto-secret
  namespace: tikceto
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: tikceto-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: tikceto