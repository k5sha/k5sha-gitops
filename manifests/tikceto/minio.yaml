apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: tikceto
  labels:
    app: minio
  annotations:
    ignore-check.kube-linter.io/no-read-only-root-fs: "Init container needs write access to prepare volumes"
    ignore-check.kube-linter.io/run-as-non-root: "Init container needs root to run chown"
    ignore-check.kube-linter.io/privilege-escalation-container: "Init container needs privilege escalation to perform chown on volumes"
spec:
  serviceName: "minio"
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      initContainers:
      - name: volume-permissions
        image: busybox:1.36
        command: ["sh", "-c", "chown -R 1000:1000 /data && chmod -R 775 /data"]
        resources:
          requests:
            cpu: "10m"
            memory: "16Mi"
          limits:
            cpu: "50m"
            memory: "32Mi"
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: true
          capabilities:
            add: ["CHOWN", "FOWNER"]
            drop: ["ALL"]
        volumeMounts:
        - name: minio-storage
          mountPath: /data

      containers:
      - name: minio
        image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
        args:
        - server
        - /data
        - --console-address
        - ":9001"
        
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true 
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        
        ports:
        - containerPort: 9000
          name: s3-api
        - containerPort: 9001
          name: console
        
        env:
        - name: MINIO_ROOT_USER
          valueFrom: { secretKeyRef: { name: ticketo-secrets, key: MINIO_ROOT_USER } }
        - name: MINIO_ROOT_PASSWORD
          valueFrom: { secretKeyRef: { name: ticketo-secrets, key: MINIO_ROOT_PASSWORD } }
        - name: MINIO_SERVER_URL
          value: "http://minio:9000"
        - name: MINIO_DEFAULT_BUCKETS
          valueFrom: { secretKeyRef: { name: ticketo-secrets, key: S3_BUCKET_NAME } }
        - name: HOME
          value: /tmp
        - name: MINIO_CONFIG_DIR
          value: /tmp/.minio

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

        volumeMounts:
        - name: minio-storage
          mountPath: /data
        - name: tmp
          mountPath: /tmp
          
        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: s3-api 
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /minio/health/ready 
            port: s3-api
          initialDelaySeconds: 30
          periodSeconds: 30
      
      volumes:
      - name: tmp
        emptyDir: {}

  volumeClaimTemplates:
  - metadata:
      name: minio-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "local-path"
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: tikceto
  labels:
    app: minio
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      protocol: TCP
      targetPort: 9000
    - name: console
      port: 9001
      protocol: TCP
      targetPort: 9001