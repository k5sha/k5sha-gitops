apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketo-frontend
  namespace: tikceto
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1      
      maxUnavailable: 0 
  selector:
    matchLabels:
      app: ticketo-frontend
  template:
    metadata:
      labels:
        app: ticketo-frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/k5sha/tikcetoweb:8b7d1d4
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15  
          periodSeconds: 5        
          successThreshold: 1
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15 
          periodSeconds: 20
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: ticketo-frontend
  namespace: tikceto
spec:
  selector:
    app: ticketo-frontend
  ports:
  - port: 80
    targetPort: 80