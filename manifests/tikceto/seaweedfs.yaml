apiVersion: v1
kind: Service
metadata:
  name: seaweedfs-master
  namespace: tikceto
spec:
  clusterIP: None
  ports:
  - port: 9333
    name: master-http
  - port: 19333
    name: master-grpc
  selector:
    app: seaweedfs
    component: master
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs-s3
  namespace: tikceto
spec:
  ports:
    - port: 8333
      name: s3
      targetPort: 8333
  selector:
    app: seaweedfs
    component: filer
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seaweedfs-master
  namespace: tikceto
  annotations:
    ignore-check.kube-linter.io/no-read-only-root-fs: "volume-permissions needs write access"
    ignore-check.kube-linter.io/run-as-non-root: "volume-permissions needs root"
    ignore-check.kube-linter.io/privilege-escalation-container: "volume-permissions needs escalation"
spec:
  serviceName: seaweedfs-master
  replicas: 1
  selector:
    matchLabels:
      app: seaweedfs
      component: master
  template:
    metadata:
      labels:
        app: seaweedfs
        component: master
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
      - name: volume-permissions
        image: busybox:1.36
        command: ["sh", "-c", "chown -R 1000:1000 /data && chmod -R 775 /data"]
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: true
          readOnlyRootFilesystem: false
        resources:
          requests: { cpu: "10m", memory: "16Mi" }
          limits: { cpu: "50m", memory: "32Mi" }
        volumeMounts:
        - name: master-data
          mountPath: /data
      containers:
      - name: master
        image: chrislusf/seaweedfs:3.81
        args: ["master", "-ip=$(POD_IP)", "-ip.bind=0.0.0.0", "-mdir=/data"]
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities: { drop: ["ALL"] }
        env:
        - name: POD_IP
          valueFrom: { fieldRef: { fieldPath: status.podIP } }
        ports:
        - containerPort: 9333
        - containerPort: 19333
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits: { cpu: "200m", memory: "256Mi" }
        volumeMounts:
        - name: master-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: master-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "local-path"
      resources:
        requests: { storage: 1Gi }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seaweedfs-volume
  namespace: tikceto
  annotations:
    ignore-check.kube-linter.io/no-read-only-root-fs: "volume-permissions needs write access"
    ignore-check.kube-linter.io/run-as-non-root: "volume-permissions needs root"
    ignore-check.kube-linter.io/privilege-escalation-container: "volume-permissions needs escalation"
spec:
  serviceName: seaweedfs-volume
  replicas: 1
  selector:
    matchLabels:
      app: seaweedfs
      component: volume
  template:
    metadata:
      labels:
        app: seaweedfs
        component: volume
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
      - name: volume-permissions
        image: busybox:1.36
        command: ["sh", "-c", "chown -R 1000:1000 /data && chmod -R 775 /data"]
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: true
          readOnlyRootFilesystem: false
        resources:
          requests: { cpu: "10m", memory: "16Mi" }
          limits: { cpu: "50m", memory: "32Mi" }
        volumeMounts:
        - name: seaweedfs-data
          mountPath: /data
      containers:
      - name: volume
        image: chrislusf/seaweedfs:3.81
        args: ["volume", "-mserver=seaweedfs-master:9333", "-port=8080", "-ip=$(POD_IP)", "-dir=/data"]
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities: { drop: ["ALL"] }
        env:
        - name: POD_IP
          valueFrom: { fieldRef: { fieldPath: status.podIP } }
        ports:
        - containerPort: 8080
        - containerPort: 18080
        resources:
          requests: { cpu: "200m", memory: "256Mi" }
          limits: { cpu: "500m", memory: "512Mi" }
        volumeMounts:
        - name: seaweedfs-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: seaweedfs-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "local-path"
      resources:
        requests: { storage: 5Gi }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seaweedfs-filer
  namespace: tikceto
  annotations:
    ignore-check.kube-linter.io/no-read-only-root-fs: "Init containers need write access"
    ignore-check.kube-linter.io/run-as-non-root: "volume-permissions needs root"
    ignore-check.kube-linter.io/privilege-escalation-container: "volume-permissions needs escalation"
spec:
  serviceName: seaweedfs-filer
  replicas: 1
  selector:
    matchLabels:
      app: seaweedfs
      component: filer
  template:
    metadata:
      labels:
        app: seaweedfs
        component: filer
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      volumes:
      - name: generated-s3-config
        emptyDir: {}
      - name: tmp-dir
        emptyDir: {}
      initContainers:
      - name: volume-permissions
        image: busybox:1.36
        command: ["sh", "-c", "chown -R 1000:1000 /data && chmod -R 775 /data"]
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: true
          readOnlyRootFilesystem: false
        resources:
          requests: { cpu: "10m", memory: "16Mi" }
          limits: { cpu: "50m", memory: "32Mi" }
        volumeMounts:
        - name: filer-data
          mountPath: /data
      - name: s3-config-generator
        image: busybox:1.36
        env:
        - name: S3_ACCESS_KEY
          valueFrom: { secretKeyRef: { name: ticketo-secrets, key: MINIO_ROOT_USER } }
        - name: S3_SECRET_KEY
          valueFrom: { secretKeyRef: { name: ticketo-secrets, key: MINIO_ROOT_PASSWORD } }
        command: ["sh", "-c"]
        args:
        - |
          cat <<EOF > /etc/seaweedfs/s3.json
          {
            "identities": [
              {
                "name": "admin",
                "credentials": [
                  {
                    "accessKey": "$S3_ACCESS_KEY",
                    "secretKey": "$S3_SECRET_KEY"
                  }
                ],
                "actions": ["Read", "Write", "List", "Tagging", "Admin"]
              },
              {
                "name": "anonymous",
                "actions": ["Read", "List"]
              }
            ]
          }
          EOF
        securityContext:
          runAsUser: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false 
          capabilities: { drop: ["ALL"] }
        resources:
          requests: { cpu: "10m", memory: "16Mi" }
          limits: { cpu: "50m", memory: "32Mi" }
        volumeMounts:
        - name: generated-s3-config
          mountPath: /etc/seaweedfs
      containers:
      - name: filer
        image: chrislusf/seaweedfs:3.81
        args: ["filer", "-master=seaweedfs-master:9333", "-s3", "-s3.config=/etc/seaweedfs/s3.json", "-s3.port=8333", "-defaultStoreDir=/data"]
        lifecycle:
          postStart:
            exec:
              command: 
              - "/bin/sh"
              - "-c"
              - |
                sleep 5;
                echo "fs.mkdir /buckets/${S3_DEFAULT_BUCKET}" | weed shell -master=seaweedfs-master:9333
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities: { drop: ["ALL"] }
        env:
        - name: S3_DEFAULT_BUCKET
          valueFrom: { secretKeyRef: { name: ticketo-secrets, key: MINIO_DEFAULT_BUCKETS } }
        - name: S3_ACCESS_KEY
          valueFrom: { secretKeyRef: { name: ticketo-secrets, key: MINIO_ROOT_USER } }
        - name: S3_SECRET_KEY
          valueFrom: { secretKeyRef: { name: ticketo-secrets, key: MINIO_ROOT_PASSWORD } }
        resources:
          requests: { cpu: "100m", memory: "256Mi" }
          limits: { cpu: "250m", memory: "512Mi" }
        ports:
        - containerPort: 8888
        - containerPort: 8333
        volumeMounts:
        - name: generated-s3-config
          mountPath: /etc/seaweedfs
        - name: filer-data
          mountPath: /data
        - name: tmp-dir        
          mountPath: /tmp
  volumeClaimTemplates:
  - metadata:
      name: filer-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "local-path"
      resources:
        requests: { storage: 2Gi }