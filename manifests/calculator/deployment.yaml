apiVersion: apps/v1
kind: Deployment
metadata:
  name: calculator-app
  namespace: calculator
  labels:
    app: calculator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: calculator
  template:
    metadata:
      labels:
        app: calculator
    spec:
      containers:
      - name: calculator
        image: ghcr.io/k5sha/calculator:1b86f3a
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15  
          periodSeconds: 5        
          successThreshold: 1
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15 
          periodSeconds: 20
        resources:
         requests:
            memory: "256Mi"
            cpu: "250m"
         limits:
            memory: "512Mi"  
            cpu: "500m"
