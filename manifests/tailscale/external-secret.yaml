apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: operator-oauth
  namespace: tailscale
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: operator-oauth 
    creationPolicy: Owner
  data:
  - secretKey: client_id
    remoteRef:
      key: tailscale
      property: client_id
  - secretKey: client_secret
    remoteRef:
      key: tailscale
      property: client_secret